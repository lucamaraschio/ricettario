<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ricettario</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F2;--bg2:#EEEAE4;--white:#FFFFFF;--text:#1A1A1A;--text2:#6B6B6B;--text3:#9E9E9E;--border:#E8E3DC;--accent:#2C2C2C;--accent2:#C8522A;--green:#2D7A4F;--red:#D93025;--blue:#3366CC;--tag-bg:#EDE9E2;--shadow:0 2px 16px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.10);--r:20px;--r-sm:12px;--r-xs:8px;--fd:'Fraunces',Georgia,serif;--fb:'DM Sans',sans-serif;--tab-h:72px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;background:var(--bg)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 48px)}
.page.active{display:flex}
.page::-webkit-scrollbar{display:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(247,245,242,0.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0px) 0 0}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
.topbar-title{font-family:var(--fd);font-size:26px;font-weight:600;letter-spacing:-.5px}
.tb-btn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:transform .15s}
.tb-btn:active{transform:scale(.92)}
.tb-btn.dark{background:var(--accent);color:white;font-size:20px}
.tb-btn.light{background:var(--tag-bg);color:var(--text)}
.tb-btn.filter-active{background:var(--accent2);color:white;position:relative}
.filter-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#FF3B30;border-radius:50%;border:2px solid var(--bg)}
.search-bar{padding:0 20px 10px;position:relative}
.search-input{width:100%;padding:12px 38px 12px 42px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-ico{position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none}
.search-clear{position:absolute;right:34px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--text3);border:none;color:white;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;font-weight:700}
.search-dropdown{position:absolute;top:calc(100% - 4px);left:20px;right:20px;background:var(--white);border-radius:var(--r-sm);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:200;overflow:hidden;display:none;max-height:300px;overflow-y:auto}
.search-dropdown.open{display:block}
.sd-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.sd-item:last-child{border:none}
.sd-item:active{background:var(--bg2)}
.sd-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.sd-thumb img{width:100%;height:100%;object-fit:cover}
.sd-name{font-size:14px;font-weight:600;line-height:1.3}
.sd-portata{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.chips-row{display:flex;gap:8px;overflow-x:auto;padding:0 20px 14px;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--white);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .2s;white-space:nowrap}
.chip.active{background:var(--accent);color:white;border-color:var(--accent)}
.chip:active{transform:scale(.95)}
.hero-section{padding:0 20px 20px}
.hero-card{border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;box-shadow:var(--shadow-lg);transition:transform .2s;user-select:none}
.hero-card:active{transform:scale(.98)}
.hero-img{width:100%;height:240px;object-fit:cover;display:block}
.hero-ph{width:100%;height:240px;background:linear-gradient(135deg,#E8D5C4,#C4D5E8);display:flex;align-items:center;justify-content:center;font-size:72px}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);padding:32px 20px 20px;color:white}
.hero-portata{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:4px}
.hero-name{font-family:var(--fd);font-size:24px;font-weight:600;line-height:1.2;margin-bottom:6px}
.hero-meta{font-size:13px;opacity:.75;display:flex;gap:12px}
.hero-fav{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);backdrop-filter:blur(8px);border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.section{padding:0 20px 24px}
.section-title{font-family:var(--fd);font-size:20px;font-weight:600;margin-bottom:14px}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.r-card{border-radius:var(--r-sm);overflow:hidden;background:var(--white);box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;border:1px solid var(--border);user-select:none}
.r-card:active{transform:scale(.97)}
.r-card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.r-card-ph{width:100%;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:36px}
.r-card-body{padding:10px 12px 12px}
.r-card-portata{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px}
.r-card-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.r-card-footer{display:flex;align-items:center;justify-content:space-between}
.r-card-time{font-size:12px;color:var(--text3)}
.r-card-fav{font-size:16px;background:none;border:none;cursor:pointer;line-height:1}
.ctx-menu{position:fixed;z-index:800;background:var(--white);border-radius:var(--r-sm);box-shadow:0 8px 32px rgba(0,0,0,.18);border:1px solid var(--border);min-width:190px;overflow:hidden;display:none}
.ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.ctx-item:last-child{border:none}
.ctx-item:active{background:var(--bg2)}
.ctx-item.danger{color:var(--red)}
.l-card{display:flex;gap:14px;align-items:center;background:var(--white);border-radius:var(--r-sm);padding:12px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;margin-bottom:12px;transition:transform .15s;user-select:none}
.l-card:active{transform:scale(.98)}
.l-card-img{width:72px;height:72px;border-radius:10px;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.l-card-img img{width:100%;height:100%;object-fit:cover}
.l-card-body{flex:1;min-width:0}
.l-card-portata{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.l-card-name{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.l-card-meta{font-size:12px;color:var(--text3)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;gap:12px}
.empty-icon{font-size:56px}
.empty-title{font-family:var(--fd);font-size:22px;font-weight:600}
.empty-sub{font-size:14px;color:var(--text2);line-height:1.6}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + env(safe-area-inset-bottom,0px));background:rgba(247,245,242,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;z-index:100}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 20px;border:none;background:none;cursor:pointer;font-family:var(--fb);transition:all .2s;border-radius:14px}
.tab-ico{font-size:22px;transition:transform .2s}
.tab-lbl{font-size:10px;font-weight:500;color:var(--text3);transition:color .2s}
.tab.active .tab-lbl{color:var(--accent2);font-weight:600}
.tab.active .tab-ico{transform:scale(1.1)}
.fab{position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 16px);right:20px;z-index:200;width:54px;height:54px;border-radius:50%;border:none;background:var(--accent);color:white;font-size:24px;box-shadow:0 6px 20px rgba(0,0,0,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.fab:active{transform:scale(.92)}
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.3);display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;max-height:92dvh;background:var(--bg);border-radius:24px 24px 0 0;border-top:1px solid var(--border);box-shadow:0 -4px 32px rgba(0,0,0,.12);overflow:hidden;animation:sheetUp .32s cubic-bezier(.32,.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:32px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-title{font-family:var(--fd);font-size:19px;font-weight:600}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--tag-bg);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.sheet-body{overflow-y:auto;max-height:calc(92dvh - 70px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 40px)}
.sheet-body::-webkit-scrollbar{display:none}
.fsec{padding:20px 20px 0}
.fsec+.fsec{padding-top:16px}
.fsec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px}
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-xs);background:var(--white);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:none;min-height:72px;line-height:1.5}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-upload{width:100%;aspect-ratio:16/9;border-radius:var(--r-sm);border:2px dashed var(--border);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;overflow:hidden;position:relative}
.photo-upload img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photo-upload-label,.photo-upload-icon{position:relative;z-index:1}
.photo-upload-label{font-size:13px;color:var(--text3);font-weight:500}
.photo-upload-icon{font-size:28px}
.photo-upload.has-photo .photo-upload-label,.photo-upload.has-photo .photo-upload-icon{display:none}
.photo-change-btn{position:absolute;bottom:8px;right:8px;z-index:2;background:rgba(0,0,0,.55);color:white;border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.ingr-row{margin-bottom:8px}
.rm-btn{width:34px;height:34px;flex-shrink:0;border-radius:50%;border:none;background:#FEE8E5;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rm-btn:active{transform:scale(.9)}
.step-wrap{margin-bottom:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--white)}
.step-top{display:flex;gap:10px;padding:12px 12px 0}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:8px}
.step-top textarea{flex:1;padding:8px 0;border:none;font-family:var(--fb);font-size:14px;color:var(--text);outline:none;resize:none;min-height:56px;line-height:1.5;background:transparent}
.step-bottom{padding:8px 12px 12px;display:flex;gap:8px;align-items:center}
.step-photo-mini{width:52px;height:52px;border-radius:8px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;overflow:hidden;background:var(--bg2);transition:all .2s}
.step-photo-mini img{width:100%;height:100%;object-fit:cover}
.step-rm-btn{margin-left:auto;padding:6px 12px;border-radius:8px;border:none;background:#FEE8E5;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.add-row-btn{width:100%;padding:10px;border-radius:var(--r-xs);border:1.5px dashed var(--border);background:transparent;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.add-row-btn:active{background:var(--tag-bg)}
.btn{width:100%;padding:15px;border-radius:var(--r-sm);border:none;font-family:var(--fb);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn-dark{background:var(--accent);color:white;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.btn-outline{background:var(--white);color:var(--text);border:1.5px solid var(--border)}
.btn-danger{background:#FEE8E5;color:var(--red)}
.btn-orange{background:var(--accent2);color:white;box-shadow:0 4px 14px rgba(200,82,42,.3)}
.form-actions{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.detail-hero{width:100%;height:280px;object-fit:cover;display:block}
.detail-hero-ph{width:100%;height:280px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:80px}
.det-portata{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.det-name{font-family:var(--fd);font-size:28px;font-weight:600;line-height:1.15;margin-bottom:8px}
.det-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.meta-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.meta-chip{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;text-align:center;min-width:64px}
.meta-chip .mv{font-size:15px;font-weight:700}
.meta-chip .ml{font-size:10px;color:var(--text3);margin-top:2px}
.seg-tabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:16px;overflow-x:auto;gap:2px}
.seg-tabs::-webkit-scrollbar{display:none}
.seg-tab{flex-shrink:0;padding:8px 12px;border-radius:9px;border:none;font-family:var(--fb);font-size:12px;font-weight:500;background:none;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.seg-tab.active{background:var(--white);color:var(--text);font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.ird{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.ird:last-child{border:none}
.ird-name{font-size:15px}
.ird-qty{font-size:14px;color:var(--text2);font-weight:500}
.step-det{display:flex;gap:14px;margin-bottom:20px}
.sdn{width:30px;height:30px;border-radius:50%;background:var(--accent);color:white;font-size:13px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.sd-body{flex:1}
.sd-text{font-size:15px;line-height:1.6;margin-bottom:8px}
.sd-img{width:100%;border-radius:var(--r-xs);object-fit:cover;max-height:180px;display:block}
.porz-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
.porz-btn{flex:1;padding:7px;border-radius:8px;border:none;font-family:var(--fb);font-size:13px;font-weight:500;background:none;color:var(--text2);cursor:pointer;transition:all .2s}
.porz-btn.active{background:var(--white);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tool-chip{display:inline-block;padding:6px 12px;background:var(--bg2);border-radius:20px;font-size:13px;margin:4px;font-weight:500}

.scan-slot{aspect-ratio:3/4;border-radius:var(--r-sm);overflow:hidden;border:2px dashed var(--border);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;position:relative;transition:all .2s}

.scan-slot-icon{font-size:32px;z-index:1}
.scan-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.5px;z-index:2}
.scan-slot.filled{border-style:solid;border-color:var(--green)}
.info-box{margin:0 20px 16px;background:#EEF5FF;border-radius:var(--r-xs);padding:12px 14px;font-size:13px;line-height:1.5;color:var(--blue);border:1px solid #C8DEFF}

.apikey-save{padding:10px 16px;background:var(--accent);color:white;border:none;border-radius:var(--r-xs);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.filter-tabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin:16px 20px 0;gap:2px}
.filter-tab{flex:1;padding:8px;border-radius:9px;border:none;font-family:var(--fb);font-size:13px;font-weight:500;background:none;color:var(--text2);cursor:pointer;transition:all .2s}
.filter-tab.active{background:var(--white);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.filter-panel{padding:16px 20px 0;display:none}
.filter-panel.active{display:block}
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px}
.tag-item{padding:8px 16px;border-radius:50px;font-size:13px;font-weight:500;background:var(--white);border:1.5px solid var(--border);cursor:pointer;transition:all .15s}
.tag-item.sel{background:var(--accent);color:white;border-color:var(--accent)}
.ingr-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:14px;outline:none;background:var(--white);margin-bottom:12px}
.ingr-search:focus{border-color:var(--accent)}
.time-val{font-size:32px;font-weight:700;font-family:var(--fd);text-align:center;margin-bottom:4px}
.time-lbl{font-size:13px;color:var(--text2);text-align:center;margin-bottom:16px}
